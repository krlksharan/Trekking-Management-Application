{% extends "base.html" %}

{% block title %}Edit User Profile{% endblock %}

{% block content %}
<div class="card shadow-sm mx-auto mt-5" style="max-width: 500px;">
    <div class="card-body p-4">
    <h2 class="card-title text-center mb-4">Edit Profile</h2>
    <form action="{{ url_for('edit_user_profile', user_id=user_prof.user_id) }}" method="POST">
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ user_prof.name }}" required>
        </div>

        <div class="mb-4">
            <label for="contact_details" class="form-label">Contact Details</label>
            <input type="text" class="form-control" id="contact_details" name="contact_details" value="{{ user_prof.contact_details }}" required>
        </div>

        <div class="d-flex justify-content-between gap-2">
            <a href="{{ url_for('user_dashboard', user_id=user_prof.user_id) }}" class="btn btn-secondary w-50">Cancel</a>
            <button type="submit" class="btn btn-primary w-50">Save Changes</button>
        </div>
    </form>
    </div>
</div>
{% endblock %}
