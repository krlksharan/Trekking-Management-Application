{% extends 'base.html' %}

{% block content %}

<h1>
    {% if trek %}
        Edit Trek
    {% else %}
        Add Trek
    {% endif %}
</h1>

<form method="POST">

    <label>Trek Name</label><br>
    <input type="text"
           name="trek_name"
           value="{{ trek.trek_name if trek else '' }}"
           required><br><br>

    <label>Location</label><br>
    <input type="text"
           name="location"
           value="{{ trek.location if trek else '' }}"
           required><br><br>

    <label>Difficulty</label><br>
    <select name="difficulty" required>
        <option value="Easy">Easy</option>
        <option value="Moderate">Moderate</option>
        <option value="Hard">Hard</option>
    </select><br><br>

    <label>Available Slots</label><br>
    <input type="number"
           name="available_slots"
           value="{{ trek.available_slots if trek else '' }}"
           required><br><br>

    <label>Assign Staff (Optional)</label><br>
    <select name="staff_id">
        <option value="">-- No Staff Assigned --</option>
        {% for staff in staffs %}
            <option value="{{ staff.staff_id }}" 
                {% if trek and trek.staff_id == staff.staff_id %}selected{% endif %}>
                {{ staff.name }}
            </option>
        {% endfor %}
    </select><br><br>

    <label>Start Date</label><br>
    <input type="date"
           name="start_date"
           value="{{ trek.start_date if trek else '' }}"
           required><br><br>

    <label>End Date</label><br>
    <input type="date"
           name="end_date"
           value="{{ trek.end_date if trek else '' }}"
           required><br><br>

    <button type="submit">
        Save Trek
    </button>

</form>

{% endblock %}
