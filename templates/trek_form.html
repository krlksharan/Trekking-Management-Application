{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    {% if trek %}
    Edit Trek
    {% else %}
    Add Trek
    {% endif %}
</h1>

<div class="card p-4 shadow-sm" style="max-width: 600px; margin: 0 auto;">
    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Trek Name</label>
            <input type="text" class="form-control" name="trek_name" value="{{ trek.trek_name if trek else '' }}"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" name="location" value="{{ trek.location if trek else '' }}"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Difficulty</label>
            <select name="difficulty" class="form-select" required>
                <option value="Easy" {% if trek and trek.difficulty=='Easy' %}selected{% endif %}>Easy</option>
                <option value="Moderate" {% if trek and trek.difficulty=='Moderate' %}selected{% endif %}>Moderate
                </option>
                <option value="Hard" {% if trek and trek.difficulty=='Hard' %}selected{% endif %}>Hard</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Duration (in days)</label>
            <input type="number" class="form-control" name="duration" value="{{ trek.duration if trek else '' }}"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Available Slots</label>
            <input type="number" class="form-control" name="available_slots"
                value="{{ trek.available_slots if trek else '' }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Assign Staff (Optional)</label>
            <select name="staff_id" class="form-select">
                <option value="">-- No Staff Assigned --</option>
                {% for staff in staffs %}
                <option value="{{ staff.staff_id }}" {% if trek and trek.staff_id==staff.staff_id %}selected{% endif %}>
                    {{ staff.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Start Date</label>
                <input type="date" class="form-control" name="start_date" value="{{ trek.start_date if trek else '' }}"
                    required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">End Date</label>
                <input type="date" class="form-control" name="end_date" value="{{ trek.end_date if trek else '' }}"
                    required>
            </div>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
                Save Trek
            </button>
            <a href="{{ url_for('manage_treks') }}" class="btn btn-secondary">Cancel</a>
        </div>

    </form>
</div>

{% endblock %}
